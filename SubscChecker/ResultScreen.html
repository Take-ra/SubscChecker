<div id="result-screen" class="hidden bg-slate-50 min-h-screen pb-safe">
  <header
    class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-200 shadow-sm"
  >
    <div
      class="max-w-md md:max-w-4xl lg:max-w-5xl mx-auto px-4 py-3 flex items-center justify-between"
    >
      <button
        id="btn-back"
        class="text-slate-600 hover:bg-slate-100 p-2 rounded-lg flex items-center transition-colors"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"
          ></path>
        </svg>
      </button>

      <h1
        class="text-xl md:text-2xl font-black tracking-tight text-slate-800 absolute left-1/2 -translate-x-1/2"
      >
        分析結果
      </h1>

      <div class="w-10"></div>
    </div>
  </header>

  <main
    class="max-w-md md:max-w-4xl lg:max-w-5xl mx-auto px-4 pt-6 pb-20 space-y-6 md:space-y-8"
  >
    <div
      class="bg-white rounded-3xl shadow-sm p-6 md:p-5 border border-slate-200 text-center relative overflow-hidden"
    >
      <h2
        class="text-slate-500 font-bold mb-2 md:mb-1 md:text-lg relative z-10"
      >
        あなたのサブスク総額
      </h2>
      <div
        class="text-4xl md:text-4xl font-extrabold text-blue-600 tracking-tight mb-2 md:mb-1 relative z-10"
      >
        <span id="res-monthly-total">0</span
        ><span
          class="text-xl md:text-xl font-bold text-slate-500 ml-1 md:ml-2 tracking-normal"
          >円<span class="text-sm md:text-lg">/月</span></span
        >
      </div>
      <div class="text-lg md:text-xl font-bold text-slate-400 relative z-10">
        年額換算: <span id="res-yearly-total">0</span>円
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 lg:grid-cols-3">
      <div
        class="bg-white rounded-3xl shadow-sm p-5 md:p-5 border border-slate-200 lg:col-span-1 h-fit text-left"
      >
        <h2
          class="text-xl md:text-xl font-black text-slate-900 mb-3 flex items-center justify-start gap-2"
        >
          <span>👑</span> 出費ランキング
        </h2>
        <div id="res-top3-list" class="space-y-2 md:space-y-2"></div>
      </div>

      <div
        class="bg-white rounded-3xl shadow-sm p-5 md:p-6 border border-slate-200 lg:col-span-2"
      >
        <div class="flex items-center justify-between mb-4">
          <h2
            class="text-xl md:text-2xl font-black text-slate-900 flex items-center gap-2"
          >
            <span>📊</span> 割合
          </h2>
          <div class="flex bg-slate-100 rounded-lg p-1">
            <button
              id="btn-chart-genre"
              class="px-3 py-1 text-sm font-bold rounded-md text-slate-500 hover:text-slate-700 transition-all"
            >
              ジャンル別
            </button>
            <button
              id="btn-chart-sub"
              class="px-3 py-1 text-sm font-bold rounded-md bg-white shadow-sm text-slate-800 transition-all"
            >
              サブスク別
            </button>
          </div>
        </div>
        <div class="relative w-full max-w-[400px] mx-auto mb-[-20px]">
          <canvas id="resultChart"></canvas>
        </div>
      </div>
    </div>
  </main>
</div>
